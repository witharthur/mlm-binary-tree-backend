version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlm
      POSTGRES_PASSWORD: mlm_secret
      POSTGRES_DB: mlm_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery-worker:
    build: .
    command: celery -A app.workers.celery_app worker -l info -c 4
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: .
    command: celery -A app.workers.celery_app beat -l info
    env_file: .env
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
